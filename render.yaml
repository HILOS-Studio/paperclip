databases:
  - name: paperclip-db
    plan: basic-256mb
    databaseName: paperclip

services:
  - type: web
    name: paperclip
    runtime: docker
    region: oregon
    plan: standard
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: public
      - key: HOST
        value: "0.0.0.0"
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: PAPERCLIP_ALLOWED_EMAIL_DOMAIN
        value: hilos.studio
